<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Inteligentes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 24px;
}

header p {
    font-size: 12px;
    opacity: 0.7;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

.resumo {
    display: flex;
    justify-content: space-between;
    text-align: center;
}

.resumo div {
    flex: 1;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    margin-top: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #334155;
}

.receita { color: #22c55e; }
.despesa { color: #ef4444; }

.delete {
    cursor: pointer;
    margin-left: 10px;
}

.ia {
    font-size: 14px;
    margin-top: 10px;
    opacity: 0.8;
}
</style>

</head>

<body>

<header>
    <h1>💰 Finanças Inteligentes</h1>
    <p>Seu controle financeiro com IA</p>
</header>

<div class="container">

<div class="card resumo">
    <div>Receita<br><b id="receita">0</b></div>
    <div>Despesa<br><b id="despesa">0</b></div>
    <div>Saldo<br><b id="saldo">0</b></div>
</div>

<div class="card">
    <input id="texto" placeholder="Ex: ganhei 100 / mercado 50">
    <button id="btnAdd">Adicionar</button>
</div>

<div class="card">
    <div id="lista"></div>
</div>

<div class="card">
    <div id="iaResumo" class="ia"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
